<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Beegraphy Ads — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#f4f1ea;--panel:#ffffff;--panel-2:#efeae0;--line:#e7e1d5;
    --ink:#22201a;--muted:#6e675b;--faint:#a89f8e;
    --accent:#0e7c66;--accent-soft:#e4f1ec;--good:#12805c;--warn:#b06a12;--bad:#c23a2b;--violet:#6d4bd6;
    --r:14px;--shadow:0 1px 2px rgba(30,25,15,.05),0 12px 30px -20px rgba(30,25,15,.25);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:"Hanken Grotesk",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased}
  h1,h2,.brand b,.kpi .v,.head h1{font-family:"Bricolage Grotesque","Hanken Grotesk",sans-serif;letter-spacing:-.015em}
  .app{display:grid;grid-template-rows:auto 1fr;height:100vh}
  .topbar{display:flex;align-items:center;gap:16px;padding:13px 20px;background:var(--panel);border-bottom:1px solid var(--line)}
  .brand{display:flex;align-items:center;gap:11px;min-width:200px}
  .brand .mark{width:30px;height:30px;border-radius:9px;background:linear-gradient(140deg,#12a184,#0e7c66);display:grid;place-items:center;font-weight:800;color:#fff;font-family:"Bricolage Grotesque",sans-serif}
  .brand b{font-size:15.5px}.brand small{display:block;color:var(--faint);font-size:11px;font-weight:500}
  .cmd{flex:1;display:flex;align-items:center;gap:11px;background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:12px 16px;transition:border-color .15s,box-shadow .15s}
  .cmd:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}.cmd .ic{color:var(--accent)}
  .cmd input{flex:1;background:none;border:none;outline:none;color:var(--ink);font-size:14px}
  .cmd input::placeholder{color:var(--faint)}
  .cmd kbd{color:var(--faint);font-size:11px;border:1px solid var(--line);border-radius:5px;padding:1px 6px;background:var(--panel)}
  .chip,select.chip{display:inline-flex;align-items:center;gap:7px;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:10px 13px;color:var(--ink);font-weight:600;white-space:nowrap;cursor:pointer;font-size:13px}
  #goalsel{font-weight:700;color:var(--accent)}
  .avatar{width:32px;height:32px;border-radius:50%;background:var(--accent-soft);display:grid;place-items:center;font-size:13px;font-weight:700;color:var(--accent)}
  .body{display:grid;grid-template-columns:230px 1fr;overflow:hidden}
  .sidebar{background:#fbf9f4;border-right:1px solid var(--line);padding:16px 13px;display:flex;flex-direction:column;overflow-y:auto}
  .nav{display:flex;flex-direction:column;gap:3px}
  .nav button{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:10px;color:var(--muted);background:none;border:none;font:inherit;font-weight:600;cursor:pointer;text-align:left;width:100%;transition:background .12s,color .12s}
  .nav button .ic{width:18px;text-align:center;font-size:15px}
  .nav button:hover{background:var(--panel-2);color:var(--ink)}
  .nav button.active{background:var(--accent-soft);color:var(--accent)}
  .nav button .badge{margin-left:auto;background:var(--accent);color:#fff;font-size:11px;font-weight:700;border-radius:20px;padding:1px 8px}
  .side-label{font-size:11px;text-transform:uppercase;letter-spacing:.9px;color:var(--faint);padding:18px 12px 7px;font-weight:700}
  .conn{display:flex;align-items:center;gap:9px;padding:8px 12px;color:var(--muted);font-size:13px;font-weight:500}
  .conn .led{width:8px;height:8px;border-radius:50%}.conn .st{margin-left:auto;font-size:11px;color:var(--faint)}
  .main{overflow-y:auto;padding:28px 34px}
  .cmdresp{display:none;background:var(--accent-soft);border:1px solid #bfe0d6;border-radius:var(--r);padding:14px 16px;margin-bottom:20px;color:var(--ink);font-size:14px}
  .cmdresp.show{display:flex;gap:11px;align-items:flex-start;animation:pop .18s ease}
  @keyframes pop{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
  .cmdresp .x{margin-left:auto;cursor:pointer;color:var(--faint);border:none;background:none;font-size:17px;line-height:1}
  .cmdresp b{color:var(--accent);font-weight:700}
  .panel{display:none}.panel.active{display:block;animation:fade .2s ease}
  @keyframes fade{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
  .head{margin-bottom:22px}.head h1{font-size:26px;margin:0 0 4px;font-weight:700}.head p{margin:0;color:var(--muted);font-size:14.5px}
  .headlines{display:grid;grid-template-columns:repeat(3,1fr);gap:17px;margin-bottom:22px}
  .hcard{background:var(--panel);border:1px solid var(--line);border-left:5px solid var(--accent);border-radius:var(--r);padding:24px;box-shadow:var(--shadow)}
  .hcard.good{border-left-color:var(--good)}.hcard.bad{border-left-color:var(--bad)}.hcard.warn{border-left-color:var(--warn)}
  .hcard .lbl{font-size:11.5px;text-transform:uppercase;letter-spacing:.8px;color:var(--faint);font-weight:700}
  .hcard .big{font-family:"Bricolage Grotesque",sans-serif;font-size:44px;font-weight:800;line-height:1.02;margin:12px 0 8px;letter-spacing:-.025em;color:var(--ink)}
  .hcard.good .big{color:var(--good)}.hcard.bad .big{color:var(--bad)}.hcard.warn .big{color:var(--warn)}
  .hcard .sub{color:var(--muted);font-size:13.5px}.hcard .sub b{color:var(--ink);font-weight:700}
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:15px;margin-bottom:22px}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:17px 18px;box-shadow:var(--shadow)}
  .kpi .k{color:var(--muted);font-size:12.5px;font-weight:600}.kpi .v{font-size:26px;font-weight:700;margin-top:8px}
  .muted{color:var(--muted)}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;margin-bottom:18px;box-shadow:var(--shadow)}
  .c-head{display:flex;align-items:center;justify-content:space-between;padding:16px 19px;border-bottom:1px solid var(--line)}
  .c-head h2{font-size:16px;margin:0;font-weight:700}.c-head .hint{color:var(--faint);font-size:12.5px}
  .c-body{padding:18px 19px}
  table{width:100%;border-collapse:collapse}
  th,td{text-align:right;padding:13px 19px;border-bottom:1px solid var(--line);white-space:nowrap}
  th:first-child,td:first-child{text-align:left}
  thead th{color:var(--faint);font-size:11px;text-transform:uppercase;letter-spacing:.6px;font-weight:700}
  tbody tr:last-child td{border-bottom:none} tbody tr:hover{background:#faf8f2}
  .camp{display:flex;align-items:center;gap:10px;font-weight:700}.dot{width:9px;height:9px;border-radius:50%}
  .cost-good{color:var(--good);font-weight:700}.cost-mid{color:var(--warn);font-weight:700}.cost-bad{color:var(--bad);font-weight:700}
  .pill{display:inline-block;font-size:10.5px;font-weight:800;padding:2px 8px;border-radius:20px;letter-spacing:.3px}.pill.best{background:rgba(18,128,92,.12);color:var(--good)}
  .na{color:var(--faint);font-style:italic}
  .summary{display:flex;gap:12px;background:var(--accent-soft);border:1px solid #bfe0d6;border-radius:var(--r);padding:15px 17px;margin-bottom:20px}
  .summary .ic{font-size:18px}.summary p{margin:0;color:var(--ink);font-size:14px}.summary b{font-weight:700}
  .lenses{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:18px}
  .lens{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:9px 15px;color:var(--muted);font-weight:600;cursor:pointer;font-size:13px;transition:all .12s}
  .lens:hover{border-color:var(--accent);color:var(--ink)}
  .lens.on{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
  .bars{display:flex;flex-direction:column;gap:13px}
  .barrow{display:grid;grid-template-columns:150px 1fr 140px;align-items:center;gap:12px;font-size:13.5px;font-weight:500}
  .track{height:10px;background:var(--panel-2);border-radius:6px;overflow:hidden}.fill{height:100%;border-radius:6px}.delta{text-align:right;font-size:12.5px;color:var(--muted)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  .board{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .col h3{font-size:11.5px;text-transform:uppercase;letter-spacing:.7px;color:var(--faint);margin:0 0 12px;display:flex;gap:8px;font-weight:700}
  .col h3 .ct{background:var(--panel-2);border-radius:20px;padding:1px 8px;font-size:10px}
  .task{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:12px;box-shadow:var(--shadow)}
  .task .row1{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .tag{font-size:9.5px;font-weight:800;padding:2px 7px;border-radius:6px;letter-spacing:.3px}
  .tag.sys{background:var(--accent-soft);color:var(--accent)}.tag.ppl{background:rgba(109,75,214,.12);color:var(--violet)}
  .task .ttl{font-weight:700;font-size:13.5px}
  .task .why{color:var(--muted);font-size:12px;border-left:2px solid var(--line);padding-left:10px;margin:9px 0}
  .who{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:12px;margin-top:9px}
  .who .av{width:22px;height:22px;border-radius:50%;background:var(--accent-soft);display:grid;place-items:center;font-size:10px;font-weight:700;color:var(--accent)}
  .acts{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
  .acts button{flex:1;border:none;border-radius:9px;padding:9px;font-weight:700;cursor:pointer;font-size:12.5px;min-width:70px}
  .approve{background:rgba(18,128,92,.12);color:var(--good)}.approve:hover{background:rgba(18,128,92,.2)}
  .reject{background:rgba(194,58,43,.1);color:var(--bad)}.reject:hover{background:rgba(194,58,43,.18)}
  .ghost{background:var(--panel-2);color:var(--muted)}.check{color:var(--good)}
  .newtask{background:var(--panel);border:1px dashed #cfc7b6;border-radius:12px;padding:13px;margin-bottom:16px;display:flex;gap:9px;flex-wrap:wrap;align-items:center;box-shadow:var(--shadow)}
  .newtask input,.newtask select{background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:9px 11px;color:var(--ink);font:inherit;font-size:13px}
  .newtask input.grow{flex:1;min-width:200px}
  .form{display:grid;gap:13px;max-width:600px}
  .fld label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:600}
  .fld input{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:11px 13px;color:var(--ink);font:inherit}
  .fld input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:13px}
  .out{background:#201d17;border:1px solid #201d17;border-radius:10px;padding:13px 15px;color:#8fe6c6;font-family:"SF Mono",Menlo,Consolas,monospace;font-size:12.5px;word-break:break-all;margin-top:6px;min-height:46px}
  .toggle{display:inline-flex;align-items:center;gap:8px;color:var(--muted);font-size:13px;cursor:pointer;font-weight:500}
  .btn{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:10px 16px;font-weight:700;cursor:pointer;font-size:13px;transition:filter .12s}
  .btn:hover{filter:brightness(1.08)}.btn.outline{background:none;border:1px solid var(--line);color:var(--ink)}
  .btn:disabled{opacity:.45;cursor:not-allowed}
  .lib{margin-top:8px}
  .lib .item{display:flex;align-items:center;gap:10px;padding:11px 13px;border:1px solid var(--line);border-radius:10px;margin-bottom:9px;background:var(--panel)}
  .lib .item code{flex:1;font-size:12px;color:var(--accent);word-break:break-all;font-family:"SF Mono",Menlo,Consolas,monospace}
  .lib .item .mini,.mini{background:var(--panel-2);border:none;color:var(--muted);border-radius:8px;padding:6px 10px;cursor:pointer;font-size:12px;font-weight:600}
  .warnmsg{color:var(--warn);font-size:12px;margin-top:5px;min-height:16px}
  .setrow{display:flex;align-items:center;justify-content:space-between;padding:15px 0;border-bottom:1px solid var(--line);gap:10px}
  .setrow:last-child{border:none}.ok{color:var(--good);font-weight:700;font-size:13px}
  .evtag{display:inline-block;background:var(--panel-2);color:var(--muted);border-radius:6px;padding:2px 8px;font-size:11px;font-family:"SF Mono",Menlo,monospace}
  .evpick{display:inline-flex;align-items:center;gap:6px;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:6px 10px;font-size:12px;color:var(--muted);cursor:pointer;font-family:"SF Mono",Menlo,monospace}
  .modebadge{position:fixed;bottom:12px;right:16px;background:var(--panel);border:1px solid var(--line);color:var(--muted);font-size:11px;padding:5px 12px;border-radius:20px;box-shadow:var(--shadow);font-weight:600}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;font-weight:700;padding:10px 18px;border-radius:22px;opacity:0;transition:opacity .2s;pointer-events:none;font-size:13px;box-shadow:0 8px 24px -8px rgba(0,0,0,.4)}
  .toast.show{opacity:1}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand"><div class="mark">B</div><div><b>Beegraphy Ads</b><small>marketing analysis</small></div></div>
    <div class="cmd"><span class="ic">⌘</span><input id="cmd" placeholder="Ask (e.g. “which campaign is cheapest?”) or assign (e.g. “assign raise EU budget to Dmitri”)" /><kbd>Enter</kbd></div>
    <select class="chip" id="range"><option value="7d">Last 7 days</option><option value="30d" selected>Last 30 days</option><option value="90d">Last 90 days</option></select>
    <div class="avatar">A</div>
  </div>
  <div class="body">
    <aside class="sidebar">
      <nav class="nav" id="nav">
        <button class="active" data-tab="dashboard"><span class="ic">◎</span> Dashboard</button>
        <button data-tab="analyze"><span class="ic">▤</span> Analyze</button>
        <button data-tab="tasks"><span class="ic">✓</span> Tasks <span class="badge" id="taskcount">0</span></button>
        <button data-tab="reviews"><span class="ic">↻</span> Reviews</button>
        <button data-tab="utm"><span class="ic">🔗</span> UTM Builder</button>
        <button data-tab="settings"><span class="ic">⚙</span> Settings</button>
      </nav>
      <div class="side-label">Connections</div>
      <div class="conn"><span class="led" style="background:var(--good)"></span> GA4 <span class="st">demo</span></div>
      <div class="conn"><span class="led" style="background:var(--good)"></span> Meta Ads <span class="st">demo</span></div>
      <div class="conn"><span class="led" style="background:var(--warn)"></span> GTM <span class="st">not set</span></div>
    </aside>
    <main class="main">
      <div class="cmdresp" id="cmdresp"></div>
      <section class="panel active" id="tab-dashboard"></section>
      <section class="panel" id="tab-analyze"></section>
      <section class="panel" id="tab-tasks"></section>
      <section class="panel" id="tab-reviews"></section>
      <section class="panel" id="tab-utm"></section>
      <section class="panel" id="tab-settings"></section>
    </main>
  </div>
</div>
<div class="modebadge">demo data · metrics are computed exactly, never guessed</div>
<div class="toast" id="toast"></div>

<script>
// ---------- demo data: campaigns carry raw EVENT counts (goals derive from these) ----------
const DEFAULT_CAMPAIGNS=[
  {name:"EU – Architects",id:"120210",color:"#12805c",spend:1180,impressions:96000,clicks:3420,events:{signup_completed:74,first_model_created:41,subscription_started:12}},
  {name:"Retargeting – Visited",id:"120211",color:"#0e7c66",spend:640,impressions:22000,clicks:1910,events:{signup_completed:58,first_model_created:33,subscription_started:19}},
  {name:"Global – Parametric",id:"120212",color:"#6d4bd6",spend:1360,impressions:210000,clicks:4050,events:{signup_completed:52,first_model_created:22,subscription_started:8}},
  {name:"Students – Broad",id:"120213",color:"#b06a12",spend:1030,impressions:180000,clicks:5210,events:null},
];
const MULT={"7d":0.25,"30d":1,"90d":2.9}, RANGE_LABEL={"7d":"Last 7 days","30d":"Last 30 days","90d":"Last 90 days"};
const state={range:"30d",lens:"campaigns",goalIdx:0};
const eur=n=>n==null?"—":"€"+Math.round(n).toLocaleString();
const num=n=>n==null?"—":Math.round(n).toLocaleString();
const pct=n=>n==null?"—":n.toFixed(1)+"%";
const eur2=n=>n==null?"—":"€"+n.toFixed(2);
function scaled(range){const m=MULT[range];return CAMPAIGNS.map(c=>{
  const ev=c.events?Object.fromEntries(Object.entries(c.events).map(([k,v])=>[k,Math.max(1,Math.round(v*m))])):null;
  const spend=Math.round(c.spend*m),signups=ev?(ev.signup_completed||0):null;
  return{...c,spend,impressions:Math.round(c.impressions*m),clicks:Math.round(c.clicks*m),events:ev,signups,firstModels:ev?(ev.first_model_created||0):null,cps:signups?Math.round(spend/signups):null}})}
function costClass(c){if(c==null)return"na";if(c<=18)return"cost-good";if(c<=30)return"cost-mid";return"cost-bad"}
// ---- fixed metric formulas (deterministic; the AI never produces a number) ----
function goalCount(c,g){if(!c.events||!g)return null;return g.events.reduce((s,e)=>s+(c.events[e]||0),0)}
function costPerGoal(c,g){const n=goalCount(c,g);return n&&n>0?c.spend/n:null}
function convRate(c,g){const n=goalCount(c,g);return c.clicks&&n!=null?n/c.clicks*100:null}
const ctr=c=>c.clicks&&c.impressions?c.clicks/c.impressions*100:null;
const cpc=c=>c.clicks?c.spend/c.clicks:null;
const cpm=c=>c.impressions?c.spend/c.impressions*1000:null;
// ---------- persistence ----------
const cap=s=>s?s[0].toUpperCase()+s.slice(1):s;
function load(k,d){try{const v=JSON.parse(localStorage.getItem(k));return v==null?d:v}catch(e){return d}}
function save(k,v){localStorage.setItem(k,JSON.stringify(v))}
const DEFAULT_GOALS=[{name:"Signup",events:["signup_completed"]},{name:"Activation",events:["first_model_created"]},{name:"Subscription",events:["subscription_started"]}];
const AVAILABLE_EVENTS=["signup_completed","first_model_created","subscription_started","project_shared","upgrade_clicked","page_view"];
let GOALS=load("evid_goals",DEFAULT_GOALS);const saveGoals=()=>save("evid_goals",GOALS);
let CAMPAIGNS=load("evid_campaigns",DEFAULT_CAMPAIGNS);const saveCampaigns=()=>save("evid_campaigns",CAMPAIGNS);
let TEAM=load("evid_team",["Abhishek","Dmitri","Maria"]);
let TASKS=load("evid_tasks",[
  {id:1,kind:"sys",title:"Add event first_model_created",why:"2 campaigns can't be scored without it.",who:"System",state:"todo"},
  {id:2,kind:"ppl",title:"Add GTM tag on “Save model”",why:"Needed before the event can fire.",who:"Dmitri",state:"todo"},
  {id:3,kind:"ppl",title:"Write new ad copy for Students",why:"Lots of clicks, few signups.",who:"Maria",state:"doing"},
  {id:4,kind:"sys",title:"Created event signup_completed",why:"",who:"Abhishek",state:"done"},
]);
const saveTasks=()=>save("evid_tasks",TASKS);
const nextId=()=>Math.max(0,...TASKS.map(t=>t.id))+1;
function curGoal(){return GOALS[state.goalIdx]||GOALS[0]||{name:"—",events:[]}}
// ---------- command box ----------
function showResp(html){const el=document.getElementById("cmdresp");el.innerHTML='<span class="ic">💬</span><div style="flex:1">'+html+'</div><button class="x" onclick="document.getElementById(\'cmdresp\').classList.remove(\'show\')">×</button>';el.classList.add("show")}
function findPerson(name){if(!name)return null;const n=name.toLowerCase();return TEAM.find(p=>p.toLowerCase()===n)||null}
function handleCommand(text){
  const t=text.trim();if(!t)return;
  if(/^(assign|task:?|add task|create task|todo)/i.test(t)||/@\w+/.test(t)){
    let body=t.replace(/^(assign|task:?|add task|create task|todo)\s*/i,"").trim();
    let who=null,m=body.match(/\s+to\s+([a-z]+)\s*$/i)||body.match(/@([a-z]+)/i);
    if(m){who=findPerson(m[1]);body=body.replace(m[0],"").trim()}
    if(!body){showResp("What's the task? Try: <b>assign raise EU budget to Dmitri</b>");return}
    const task={id:nextId(),kind:who?"ppl":"sys",title:cap(body),why:"Added from the command box.",who:who||"System",state:"todo"};
    TASKS.unshift(task);saveTasks();renderTasks();
    showResp(`Created task <b>“${task.title}”</b>${who?` and assigned it to <b>${who}</b>`:" for the <b>System</b> to do"}. See the <b>Tasks</b> tab.`);
    toast("Task created");gotoTab("tasks");return;
  }
  const rows=scaled(state.range),q=t.toLowerCase(),g=curGoal();

  else if(/expensive|worst|highest cost/.test(q)&&withGoal.length){const d=withGoal.reduce((a,x)=>a.cost>=x.cost?a:x);ans=`<b>${d.c.name}</b> is the most expensive for <b>${g.name}</b> at <b>${eur2(d.cost)}</b> each.`}
  else if(/total spend|how much.*spen|spend total/.test(q)){ans=`You spent <b>${eur(spend)}</b> across ${rows.length} campaigns (${RANGE_LABEL[state.range]}).`}
  else if(/wasted|no signup|unscored|not tracked/.test(q)){const w=rows.filter(c=>{const n=goalCount(c,g);return n==null||n===0});ans=`<b>${eur(w.reduce((s,c)=>s+c.spend,0))}</b> went to ${w.length} campaign(s) with no tracked <b>${g.name}</b>${w.length?": "+w.map(c=>c.name).join(", "):""}.`}
  else if(/ctr|click.?through/.test(q)){const b=rows.reduce((a,c)=>(ctr(c)||0)>=(ctr(a)||0)?c:a);ans=`Highest CTR: <b>${b.name}</b> at <b>${pct(ctr(b))}</b>.`}
  else if(/cpc|cost per click/.test(q)){const b=rows.reduce((a,c)=>(cpc(c)||9e9)<=(cpc(a)||9e9)?c:a);ans=`Lowest CPC: <b>${b.name}</b> at <b>${eur2(cpc(b))}</b>.`}
  else if(/most|top campaign|which.*(signup|convert|activ|subscri)/.test(q)){const b=rows.reduce((a,c)=>(goalCount(c,g)||0)>=(goalCount(a,g)||0)?c:a);ans=`<b>${b.c?b.c.name:b.name}</b> brought the most <b>${g.name}</b>: <b>${num(goalCount(b,g))}</b>.`}
  else if(/how many campaign|number of campaign/.test(q)){ans=`You have <b>${rows.length}</b> campaigns running.`}
  else if(/cost per|average cost|avg cost/.test(q)){ans=`Average cost per <b>${g.name}</b> is <b>${eur2(gtot?spend/gtot:null)}</b> (${num(gtot)} on ${eur(spend)}).`}
  else if(/how many|total/.test(q)){ans=`<b>${num(gtot)}</b> <b>${g.name}</b> conversions came from ads (${RANGE_LABEL[state.range]}). Pick a different goal in Analyze to switch.`}
  else{ans=`I answer exact metrics for the <b>${g.name}</b> goal: <b>which campaign is cheapest?</b> · <b>total spend</b> · <b>wasted spend</b> · <b>highest CTR</b> · <b>cost per ${g.name.toLowerCase()}</b>. Change the goal in Analyze. Or assign: <b>assign &lt;what&gt; to &lt;name&gt;</b>.`}
  showResp(ans);
}

function renderAnalyze(){
  const rows=scaled(state.range),g=curGoal();

  const gl=g.name.toLowerCase();let body="";
  if(state.lens==="campaigns"){

  } else if(state.lens==="funnel"){
    const clicks=rows.reduce((s,c)=>s+c.clicks,0);
    const steps=[["Clicks",clicks],...GOALS.map(gg=>[gg.name,rows.reduce((s,c)=>s+(goalCount(c,gg)||0),0)])];
    const colors=["var(--accent)","var(--good)","var(--violet)","var(--warn)","var(--bad)"],maxv=clicks||1;
    body=`<div class="card"><div class="c-head"><h2>Goal funnel</h2><span class="hint">clicks → ${GOALS.map(gg=>gg.name).join(" → ")}</span></div><div class="c-body"><div class="bars">
      ${steps.map((s,i)=>`<div class="barrow"><span>${s[0]}</span><div class="track"><div class="fill" style="width:${Math.max(s[1]/maxv*100,2)}%;background:${colors[i%colors.length]}"></div></div><span class="delta">${num(s[1])}${i>0&&steps[i-1][1]?` · ${pct(s[1]/steps[i-1][1]*100)}`:""}</span></div>`).join("")}
      </div></div></div>`;
  } else if(state.lens==="wasted"){
    const w=rows.filter(c=>{const gc=goalCount(c,g);return gc==null||gc===0}),tot=w.reduce((s,c)=>s+c.spend,0);
    body=`<div class="card"><div class="c-head"><h2>Wasted spend — ${g.name}</h2><span class="hint">spend with zero “${g.name}”</span></div><div class="c-body"><div class="summary" style="margin-bottom:14px"><span class="ic">⚠️</span><p><b>${eur(tot)}</b> spent with no tracked <b>${g.name}</b>.</p></div>${w.length?`<table><thead><tr><th>Campaign</th><th>Spent</th><th>Clicks</th></tr></thead><tbody>${w.map(c=>`<tr><td><span class="camp"><span class="dot" style="background:${c.color}"></span>${c.name}</span></td><td>${eur(c.spend)}</td><td>${num(c.clicks)}</td></tr>`).join("")}</tbody></table>`:`<p class="muted">Every campaign has ${g.name} conversions. 🎉</p>`}</div></div>`;
  } else {
    body=`<div class="card"><div class="c-head"><h2>Ad metrics</h2><span class="hint">CTR · CPC · CPM — exact, from spend/clicks/impressions</span></div>
      <table><thead><tr><th>Campaign</th><th>CTR</th><th>CPC</th><th>CPM</th></tr></thead>
      <tbody>${rows.map(c=>`<tr><td><span class="camp"><span class="dot" style="background:${c.color}"></span>${c.name}</span></td><td>${pct(ctr(c))}</td><td>${eur2(cpc(c))}</td><td>${eur2(cpm(c))}</td></tr>`).join("")}</tbody></table></div>`;
  }
  const goalOpts=GOALS.map((gg,i)=>`<option value="${i}"${i===state.goalIdx?" selected":""}>${gg.name}</option>`).join("");
  document.getElementById("tab-analyze").innerHTML=`
    <div class="head"><h1>Analyze</h1><p>Exact metrics from your data — pick a goal and a lens. (${RANGE_LABEL[state.range]})</p></div>
    <div style="display:flex;gap:11px;align-items:center;margin-bottom:18px;flex-wrap:wrap">
      <span class="muted" style="font-size:13px;font-weight:700">Goal</span>
      <select class="chip" id="goalsel">${goalOpts}</select>
      <div class="lenses" style="margin:0">${LENSES.map(l=>`<span class="lens${state.lens===l[0]?' on':''}" data-lens="${l[0]}">${l[1]}</span>`).join("")}</div>
    </div>

}

    <div class="card"><div class="c-head"><h2>Campaigns</h2><span class="hint">shared identity — UTM · reports · goals all use these</span></div><div class="c-body">
      ${CAMPAIGNS.map((c,i)=>`<div class="setrow"><div class="who" style="flex:1;gap:9px"><span class="dot" style="background:${c.color}"></span><input data-cname="${i}" value="${c.name}" style="flex:1;min-width:120px;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:6px 9px;color:var(--ink);font:inherit;font-size:13px" /><input data-cid="${i}" value="${c.id||""}" placeholder="id" style="width:96px;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:6px 9px;color:var(--muted);font-size:12px;font-family:'SF Mono',Menlo,monospace" /></div><button class="mini" data-delcamp="${i}" style="color:var(--bad)">Remove</button></div>`).join("")}
      <div class="setrow"><input id="nc-name" placeholder="New campaign name" style="flex:1;background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:9px 11px;color:var(--ink)" /><input id="nc-id" placeholder="Meta id" style="width:110px;background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:9px 11px;color:var(--ink)" /><button class="btn" id="nc-add">+ Add</button></div>
      <p class="muted" style="font-size:12px;margin-top:6px">Rename or re-ID a campaign here and it updates <b>everywhere</b> — UTM Builder, reports, and goal attribution. This is the bridge that keeps GA4 ↔ Meta aligned.</p>
    </div></div>
    <div class="card"><div class="c-head"><h2>Conversion goals</h2><span class="hint">you control what counts — each tracked independently</span></div><div class="c-body">
      ${GOALS.map((g,i)=>`<div class="setrow"><div><b>${g.name}</b> &nbsp;${g.events.map(e=>`<span class="evtag">${e}</span>`).join(" ")||'<span class="muted" style="font-size:12px">no events</span>'}</div><button class="mini" data-delgoal="${i}" style="color:var(--bad)">Remove</button></div>`).join("")}
      <div style="border-top:1px dashed var(--line);margin-top:10px;padding-top:15px">
        <div style="display:flex;gap:9px;flex-wrap:wrap;align-items:center;margin-bottom:12px"><input id="ng-name" placeholder="New goal name (e.g. Purchase)" style="flex:1;min-width:200px;background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:9px 11px;color:var(--ink)" /><button class="btn" id="ng-add">+ Add goal</button></div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">${AVAILABLE_EVENTS.map(e=>`<label class="evpick"><input type="checkbox" value="${e}" /> ${e}</label>`).join("")}</div>
        <p class="muted" style="font-size:12px;margin-top:10px">Tick the event(s) that count for the new goal, name it, add. Formulas (cost, rate) stay fixed — you only choose the events.</p>
      </div>
    </div></div>
    <div class="card"><div class="c-head"><h2>Team members</h2><span class="hint">assignable in Tasks</span></div><div class="c-body">
      ${TEAM.map((p,i)=>`<div class="setrow"><div class="who"><span class="av">${p[0]}</span> ${p}</div><button class="mini" data-delteam="${i}" style="color:var(--bad)">Remove</button></div>`).join("")}
      <div class="setrow"><input id="tm-name" placeholder="Add a teammate…" style="flex:1;background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:9px 11px;color:var(--ink)" /><button class="btn" id="tm-add">+ Invite</button></div>
    </div></div>`;
}
// ---------- wiring ----------
function gotoTab(tab){document.querySelectorAll("#nav button").forEach(x=>x.classList.toggle("active",x.dataset.tab===tab));document.querySelectorAll(".panel").forEach(p=>p.classList.toggle("active",p.id==="tab-"+tab));document.querySelector(".main").scrollTop=0}
function renderAll(){renderDashboard();renderAnalyze();renderTasks();renderReviews();renderUtm();renderSettings()}
document.getElementById("nav").addEventListener("click",e=>{const b=e.target.closest("button[data-tab]");if(b)gotoTab(b.dataset.tab)});
document.getElementById("range").addEventListener("change",e=>{state.range=e.target.value;renderDashboard();renderAnalyze()});
document.getElementById("cmd").addEventListener("keydown",e=>{if(e.key==="Enter"){handleCommand(e.target.value);e.target.value=""}});
document.getElementById("tab-analyze").addEventListener("click",e=>{const l=e.target.closest("[data-lens]");if(l){state.lens=l.dataset.lens;renderAnalyze()}});
document.getElementById("tab-analyze").addEventListener("change",e=>{if(e.target.id==="goalsel"){state.goalIdx=+e.target.value;renderAnalyze()}});
document.getElementById("tab-tasks").addEventListener("click",e=>{
  if(e.target.id==="nt-add"){const title=document.getElementById("nt-title").value.trim(),who=document.getElementById("nt-who").value;if(!title){toast("Type a task first");return}TASKS.unshift({id:nextId(),kind:who?"ppl":"sys",title:cap(title),why:"Added manually.",who:who||"System",state:"todo"});saveTasks();renderTasks();toast("Task added");return}
  const btn=e.target.closest("[data-act]");if(!btn)return;
  const id=+btn.dataset.id,act=btn.dataset.act,t=TASKS.find(x=>x.id===id);if(!t)return;
  if(act==="approve"){t.state="done";toast("Done ✓")}else if(act==="reject"){TASKS=TASKS.filter(x=>x.id!==id);toast("Removed")}else if(act==="doing"){t.state="doing"}
  saveTasks();renderTasks();
});
document.getElementById("tab-tasks").addEventListener("change",e=>{const r=e.target.getAttribute("data-reassign");if(r){const t=TASKS.find(x=>x.id===+r);if(t){t.who=e.target.value;t.kind="ppl";saveTasks();toast("Reassigned to "+t.who)}}});
document.getElementById("tab-settings").addEventListener("click",e=>{
  if(e.target.id==="tm-add"){const n=cap(document.getElementById("tm-name").value.trim());if(n&&!TEAM.includes(n)){TEAM.push(n);save("evid_team",TEAM);renderSettings();renderTasks();toast(n+" added")}return}
  if(e.target.id==="nc-add"){const name=document.getElementById("nc-name").value.trim(),id=document.getElementById("nc-id").value.trim();if(!name){toast("Name the campaign");return}const cl=["#12805c","#0e7c66","#6d4bd6","#b06a12","#c23a2b","#2f7fd6"];CAMPAIGNS.push({name,id,color:cl[CAMPAIGNS.length%cl.length],spend:0,impressions:0,clicks:0,events:null});saveCampaigns();renderSettings();renderDashboard();renderAnalyze();renderUtm();toast("Campaign added");return}
  if(e.target.id==="ng-add"){const name=cap(document.getElementById("ng-name").value.trim());const evs=[...document.querySelectorAll("#tab-settings .evpick input:checked")].map(x=>x.value);if(!name){toast("Name the goal");return}if(!evs.length){toast("Pick at least one event");return}if(GOALS.some(g=>g.name.toLowerCase()===name.toLowerCase())){toast("Goal already exists");return}GOALS.push({name,events:evs});saveGoals();renderSettings();renderAnalyze();toast(name+" goal added");return}
  const dt=e.target.getAttribute("data-delteam");if(dt!==null){TEAM.splice(+dt,1);save("evid_team",TEAM);renderSettings();renderTasks();toast("Removed");return}
  const dg=e.target.getAttribute("data-delgoal");if(dg!==null){GOALS.splice(+dg,1);if(state.goalIdx>=GOALS.length)state.goalIdx=0;saveGoals();renderSettings();renderAnalyze();toast("Goal removed");return}
  const dc=e.target.getAttribute("data-delcamp");if(dc!==null){CAMPAIGNS.splice(+dc,1);saveCampaigns();renderSettings();renderDashboard();renderAnalyze();renderUtm();toast("Campaign removed");return}
});
document.getElementById("tab-settings").addEventListener("change",e=>{
  const cn=e.target.getAttribute("data-cname"),ci=e.target.getAttribute("data-cid");
  if(cn!==null){CAMPAIGNS[+cn].name=e.target.value;saveCampaigns();renderDashboard();renderAnalyze();renderUtm();toast("Renamed")}
  if(ci!==null){CAMPAIGNS[+ci].id=e.target.value;saveCampaigns();renderUtm();toast("ID updated")}
});
renderAll();
</script>
</body>
</html>
